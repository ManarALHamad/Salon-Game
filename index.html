<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Game 💇🏻‍♀️</title>
    <link rel="stylesheet" href="./css/style.css">
    <script defer src="./app.js"></script>
</head>

<body>
    <h1>Welcome to the salon game</h1>
    <h2>Game Instructions</h2>
    <p>you have 20 seconds to dry the customer's hair
        
    </p>
    <!-- start button and timer -->
<div class ='game'>
<button id= 'startBtn'>Start the game</button>

</div>
<div id="timer">Time:20</div>
<div class="character">

    <!-- Hair -->
     <!-- drop the dryer on the hair(dropZone) -->

     <section class = 'dropZone' id ='dropZone'>
    <div class="hairBase" id="hairBase"></div>
    <div class="hairLeft" id="hairLeft"></div>
    <div class="hairRight" id="hairRight"></div>
    <div class="bangs" class = "bangsdry" id="bangs"></div>
    
        </section>

    <!-- Face -->
    <div class="face">
        <div class="ear left-ear"></div>
        <div class="ear right-ear"></div>

        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>

        <div class="nose"></div>
        <div class="mouth"></div>
    </div>

   
    

    <!-- Wet Hair water-->
    
    <!-- <img id ="water" src = "images/water.png" alt ='water'> -->
</div>

<!-- Hair Dryer -->
<div id ="dryer">
   <img src="images/hair-dryer.png" alt ="Hair Dryer">
</div>

<button id ="reset">Replay</button>

</body>
</html>
