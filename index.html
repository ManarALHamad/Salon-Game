<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Game 💇🏻‍♀️</title>
    <link rel="stylesheet" href="./css/style.css">
    <script defer src="./app.js"></script>
</head>

<body>
    <!-- start button and timer -->
<div class ='game'>
<button id= 'startBtn'>Start the game</button>

</div>
<div id="timer">Time:10</div>
<div class="character">

    <!-- Hair -->
     <!-- drop the dryer on the hair -->

     <section class = 'dropZone' id ='dropZone'>
    <div class="hairBase" id="hairBase"></div>
    <div class="hairLeft" id="hairLeft"></div>
    <div class="hairRight" id="hairRight"></div>
        </section>

    <!-- Face -->
    <div class="face">
        <div class="ear left-ear"></div>
        <div class="ear right-ear"></div>

        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>

        <div class="nose"></div>
        <div class="mouth"></div>
    </div>

    <!-- Hair in Front -->
    <div class="bangs" id="bangs"></div>

    <!-- Wet Hair Overlay -->
    <div class="wet" id="wet"></div>

</div>

<!-- Hair Dryer -->
<div id ="dryer">
   <img src="images/hair-dryer.png" alt ="Hair Dryer">
</div>

<button id ="reset">Replay</button>

</body>
</html>
