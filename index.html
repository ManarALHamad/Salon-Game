<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Game 💇🏻‍♀️</title>
    <link rel="stylesheet" href="./css/style.css">
    <script defer src="./app.js"></script>
   
</head>

<body>

    <header id="gameHeader">
        <h1 class="welcome-title">Welcome!</h1>
        <ul class="instructions">
            <li>Drag the hair dryer onto the wet hair</li>
            <li>Dry all sections before time runs out</li>
            <li>Click "Start the game" to begin</li>
        </ul>
    </header>


    
    <!-- start button and timer -->
<div class ='game'>
<button id= 'startBtn'>Start the game</button>

</div>
<div id="timer">Time:20</div>
<div class="character">

    <!-- Hair -->
     <!-- drop the dryer on the hair(dropZone) -->

     <section class = 'dropZone' id ='dropZone'>
    <div class="hairBase" id="hairBase"></div>
    <div class="hairLeft" id="hairLeft"></div>
    <div class="hairRight" id="hairRight"></div>
    <div class="bangs" class = "bangsdry" id="bangs"></div>
    
        </section>

    <!-- Face -->
    <div class="face">
        <div class="ear left-ear"></div>
        <div class="ear right-ear"></div>

        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>

        <div class="nose"></div>
        <div class="mouth"></div>
    </div>

   
    

    <!-- Wet Hair water-->
    
    <!-- <img id ="water" src = "images/water.png" alt ='water'> -->
</div>

<!-- Hair Dryer -->
<div id ="dryer">
   <img src="images/hair-dryer.png" alt ="Hair Dryer">
</div>

<button id ="reset">Reset</button>





</body>
</html>
